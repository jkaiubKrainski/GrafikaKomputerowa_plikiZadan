<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three.js - Figura Szachowa (Pionek)</title>
<style>
  :root {
    --bg-top: #e9dcc6;
    --bg-bottom: #ccb18d;
    --panel: rgba(32, 24, 16, 0.78);
    --text: #f2e5d3;
  }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    overflow: hidden;
    background: radial-gradient(circle at 20% 20%, var(--bg-top) 0%, var(--bg-bottom) 70%);
    font-family: "Avenir Next", "Segoe UI", sans-serif;
  }

  canvas {
    display: block;
  }

  .hud {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 10;
    color: var(--text);
    background: var(--panel);
    border: 1px solid rgba(255, 232, 206, 0.22);
    border-radius: 10px;
    padding: 10px 12px;
    line-height: 1.35;
    backdrop-filter: blur(6px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    max-width: 330px;
  }

  .hud b {
    letter-spacing: 0.2px;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.184.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div class="hud">
  <b>Pionek</b><br>
  Poruszanie kamerą za pomocą myszy.
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xd4bc9d, 16, 36);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(6.5, 4.8, 8.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1.65, 0);
controls.minDistance = 4;
controls.maxDistance = 18;

const hemi = new THREE.HemisphereLight(0xfff5dd, 0x61462f, 0.55);
scene.add(hemi);

const keyLight = new THREE.DirectionalLight(0xfff0db, 1.1);
keyLight.position.set(5, 9, 6);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.left = -9;
keyLight.shadow.camera.right = 9;
keyLight.shadow.camera.top = 9;
keyLight.shadow.camera.bottom = -9;
scene.add(keyLight);

const rim = new THREE.DirectionalLight(0xcaa57e, 0.45);
rim.position.set(-6, 4, -4);
scene.add(rim);

function createPawn() {
  const pawn = new THREE.Group();

  const ceramic = new THREE.MeshStandardMaterial({
    color: 0xf3f1eb,
    roughness: 0.2,
    metalness: 0.05,
    envMapIntensity: 0.8
  });

  const profilePoints = [
    [1.18, 0.00],
    [1.34, 0.06],
    [1.46, 0.17],
    [1.45, 0.34],
    [1.32, 0.52],
    [1.15, 0.74],
    [1.00, 1.00],
    [0.88, 1.28],
    [0.78, 1.58],
    [0.70, 1.88],
    [0.62, 2.16],
    [0.56, 2.40],
    [0.51, 2.62],
    [0.48, 2.80],
    [0.47, 2.95],
    [0.50, 3.08],
    [0.56, 3.16],
    [0.63, 3.22],
    [0.68, 3.25]
  ].map(([x, y]) => new THREE.Vector2(x, y));

  const bodyGeometry = new THREE.LatheGeometry(profilePoints, 96);
  const body = new THREE.Mesh(bodyGeometry, ceramic);
  body.castShadow = true;
  body.receiveShadow = true;
  pawn.add(body);

  const bottomCap = new THREE.Mesh(
    new THREE.CircleGeometry(1.17, 96),
    ceramic
  );
  bottomCap.rotation.x = Math.PI / 2;
  bottomCap.position.y = 0.0;
  bottomCap.castShadow = true;
  bottomCap.receiveShadow = true;
  pawn.add(bottomCap);

  const collar = new THREE.Mesh(
    new THREE.CylinderGeometry(0.72, 0.80, 0.16, 64),
    ceramic
  );
  collar.position.y = 3.31;
  collar.castShadow = true;
  collar.receiveShadow = true;
  pawn.add(collar);

  const head = new THREE.Mesh(new THREE.SphereGeometry(0.72, 64, 64), ceramic);
  head.position.y = 3.92;
  head.castShadow = true;
  pawn.add(head);

  return pawn;
}

const pawn = createPawn();
pawn.position.y = 0.02;
scene.add(pawn);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
